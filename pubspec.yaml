name: pagepilot
description: "PagePilot - A Reading Discipline Engine for serious learners."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # File & Path
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.6

  # PDF
  syncfusion_flutter_pdfviewer: ^27.2.5
  syncfusion_flutter_pdf: ^27.2.5

  # AI
  google_generative_ai: ^0.4.6

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
